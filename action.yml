name: Setup Bellows
description: Configure Cargo-native remote compiler reuse on a self-hosted runner

inputs:
  server-url:
    description: Bellows server base URL
    required: true
  auth-token:
    description: Bellows bearer token
    required: false
  bellows-binary:
    description: Preinstalled Bellows client command or absolute path
    default: bellows
  target-namespace:
    description: Persistent Cargo target namespace for this workload
    default: stable

runs:
  using: composite
  steps:
    - name: Configure Bellows
      shell: bash
      env:
        INPUT_SERVER: ${{ inputs.server-url }}
        INPUT_TOKEN: ${{ inputs.auth-token }}
        INPUT_BINARY: ${{ inputs.bellows-binary }}
        TARGET_NAMESPACE: ${{ inputs.target-namespace }}
      run: |
        set -euo pipefail
        case "$TARGET_NAMESPACE" in
          stable|clippy|browser-stable|threaded) ;;
          *) echo "unsupported Cargo target namespace: $TARGET_NAMESPACE" >&2; exit 2 ;;
        esac

        binary="$(command -v "$INPUT_BINARY" || true)"
        [ -n "$binary" ] || {
          echo "Bellows is not installed: $INPUT_BINARY" >&2
          exit 1
        }

        target_root="${CARGO_TARGET_DIR:-$GITHUB_WORKSPACE/target}"
        target_dir="$target_root/$TARGET_NAMESPACE"
        mkdir -p "$target_dir" "$RUNNER_TEMP/bellows"

        {
          echo "BELLOWS_SERVER=$INPUT_SERVER"
          echo "BELLOWS_WORKSPACE=$GITHUB_WORKSPACE"
          echo "BELLOWS_STATE_DIR=$RUNNER_TEMP/bellows"
          echo "RUSTC_WRAPPER=$binary"
          echo "CARGO_INCREMENTAL=0"
          echo "CARGO_PROFILE_TEST_DEBUG=0"
          echo "CARGO_PROFILE_DEV_DEBUG=0"
          echo "MANIFOLD_CARGO_TARGET_ROOT=$target_root"
          echo "CARGO_TARGET_DIR=$target_dir"
        } >> "$GITHUB_ENV"
        if [ -n "$INPUT_TOKEN" ]; then
          echo "BELLOWS_AUTH_TOKEN=$INPUT_TOKEN" >> "$GITHUB_ENV"
        fi
        echo "Bellows target namespace: $TARGET_NAMESPACE -> $target_dir"

    - name: Verify Bellows service
      shell: bash
      env:
        BELLOWS_SERVER: ${{ inputs.server-url }}
        BELLOWS_AUTH_TOKEN: ${{ inputs.auth-token }}
        INPUT_BINARY: ${{ inputs.bellows-binary }}
      run: "$INPUT_BINARY" doctor

